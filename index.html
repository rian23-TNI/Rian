<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animasi Mudik</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to top, #87ceeb, #e0f7ff);
    }.road {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #333;
}

.line {
  position: absolute;
  bottom: 55px;
  width: 200%;
  height: 10px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
  animation: moveRoad 2s linear infinite;
}

@keyframes moveRoad {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.car {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 60px;
  background: red;
  border-radius: 10px;
}

.wheel {
  position: absolute;
  bottom: -15px;
  width: 25px;
  height: 25px;
  background: black;
  border-radius: 50%;
  animation: spin 0.5s linear infinite;
}

.wheel.left { left: 10px; }
.wheel.right { right: 10px; }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.sun {
  position: absolute;
  top: 50px;
  right: 80px;
  width: 60px;
  height: 60px;
  background: yellow;
  border-radius: 50%;
  box-shadow: 0 0 30px yellow;
}

.text {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #333;
  animation: fade 3s infinite alternate;
}

@keyframes fade {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

  </style>
</head>
<body>  <div class="text">Selamat Mudik 🚗💨 Hati-hati di Jalan! Saya tutup sedang Mudik</div>  <div class="sun"></div>  <div class="road">
    <div class="line"></div>
  </div>  <div class="car">
    <div class="wheel left"></div>
    <div class="wheel right"></div>
  </div>  <script>
    // Efek goyangan mobil biar terasa jalan
    const car = document.querySelector('.car');
    let up = true;

    setInterval(() => {
      car.style.transform = up
        ? 'translate(-50%, -2px)'
        : 'translate(-50%, 2px)';
      up = !up;
    }, 200);
  </script></body>
</html>
